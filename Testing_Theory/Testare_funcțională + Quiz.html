<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Complet QA: Testarea Funcțională</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- COMPONENTE UI REUTILIZABILE ---

        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            const icons = {
                home: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                layers: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                tool: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
                check: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                cpu: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>,
                zap: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                alert: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
                list: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
                target: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
                file: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>,
                code: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
                cloud: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
                trendingDown: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>,
                activity: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                briefcase: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
                arrowLeft: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
                shield: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                bookOpen: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></svg>,
                search: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                userPlus: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>,
                shoppingCart: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
                creditCard: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
                refresh: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
                globe: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
                terminal: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
                plus: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                refreshCw: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            };
            return icons[name] || null;
        };

        const Card = ({ title, children, icon, color = "indigo" }) => (
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 hover:shadow-xl hover:border-indigo-100 transition-all duration-300 h-full">
                <div className="flex items-center gap-4 mb-6">
                    <div className={`p-3 bg-${color}-50 text-${color}-600 rounded-2xl shadow-sm shrink-0`}>
                        <Icon name={icon} size={24} color="currentColor" />
                    </div>
                    <h3 className="font-bold text-xl text-slate-800 tracking-tight">{title}</h3>
                </div>
                <div className="text-slate-600 leading-relaxed text-sm space-y-2">
                    {children}
                </div>
            </div>
        );

        // --- QUIZ COMPONENT ---

        const Quiz = () => {
            const questions = [
                {
                    q: "Care este focusul principal al testării funcționale?",
                    options: [
                        "Analiza codului sursă",
                        "Verificarea dacă sistemul face ceea ce trebuie conform specificațiilor",
                        "Măsurarea performanței serverului",
                        "Verificarea securității bazei de date"
                    ],
                    correct: 1
                },
                {
                    q: "Testarea de tip Black-Box presupune:",
                    options: [
                        "Cunoașterea detaliată a codului intern",
                        "Testarea doar a componentelor hardware",
                        "Analizarea intrărilor și ieșirilor fără a vedea codul sursă",
                        "Testarea pe ecrane care nu funcționează"
                    ],
                    correct: 2
                },
                {
                    q: "Ce tehnică presupune gruparea datelor de intrare în clase pentru care sistemul are un comportament similar?",
                    options: [
                        "Boundary Value Analysis",
                        "Decision Table Testing",
                        "Equivalence Partitioning",
                        "Error Guessing"
                    ],
                    correct: 2
                },
                {
                    q: "Unde se ascund cele mai multe defecte conform tehnicii Boundary Value Analysis (BVA)?",
                    options: [
                        "În mijlocul intervalelor de date",
                        "La limitele sau marginile intervalelor de trecere",
                        "În documentația de design",
                        "Doar în câmpurile de text obligatorii"
                    ],
                    correct: 1
                },
                {
                    q: "Care tehnică folosește o matrice pentru a verifica toate combinațiile de condiții logice dintr-o aplicație?",
                    options: [
                        "State Transition Testing",
                        "Decision Table Testing",
                        "Use Case Testing",
                        "Equivalence Partitioning"
                    ],
                    correct: 1
                },
                {
                    q: "Tehnica 'State Transition' este ideală pentru testarea:",
                    options: [
                        "Vitezei de încărcare a paginilor",
                        "Sistemelor cu fluxuri complexe de statusuri (ex: ATM, procese de comandă)",
                        "Culorilor interfeței grafice",
                        "Performanței bazei de date"
                    ],
                    correct: 1
                },
                {
                    q: "Care este scopul testării de Regresie?",
                    options: [
                        "Găsirea de bug-uri noi în funcționalități noi",
                        "Asigurarea că modificările noi nu au afectat funcțiile deja existente",
                        "Testarea sistemului sub sarcină maximă",
                        "Validarea design-ului grafic"
                    ],
                    correct: 1
                },
                {
                    q: "Când se realizează testarea de tip Smoke?",
                    options: [
                        "La finalul proiectului, înainte de arhivare",
                        "După fiecare bug-fix minor",
                        "Imediat după primirea unui build nou, pentru a verifica stabilitatea de bază",
                        "Doar când serverul emite erori critice"
                    ],
                    correct: 2
                },
                {
                    q: "Ce nivel de testare se concentrează pe interacțiunea dintre module?",
                    options: [
                        "Unit Testing",
                        "Integration Testing",
                        "System Testing",
                        "Acceptance Testing"
                    ],
                    correct: 1
                },
                {
                    q: "Care este rolul testării Negative?",
                    options: [
                        "Să demonstreze că testerul este pesimist",
                        "Să verifice modul în care sistemul tratează datele invalide sau eronate",
                        "Să găsească defecte în documentația de proiect",
                        "Să încetinească procesul de dezvoltare"
                    ],
                    correct: 1
                },
                {
                    q: "O verificare rapidă de tip 'bun simț' după un fix se numește:",
                    options: [
                        "Regression Testing",
                        "Smoke Testing",
                        "Sanity Testing",
                        "UAT"
                    ],
                    correct: 2
                },
                {
                    q: "Ce reprezintă UAT (User Acceptance Testing)?",
                    options: [
                        "Testarea unitară realizată de developeri",
                        "Validarea finală a software-ului de către client/utilizator final",
                        "Testarea automată a interfeței",
                        "Verificarea vitezei de încărcare a paginii"
                    ],
                    correct: 1
                }
            ];

            const [current, setCurrent] = useState(0);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);

            const handleAnswer = (idx) => {
                if (selected !== null) return;
                setSelected(idx);
                const correct = idx === questions[current].correct;
                setIsCorrect(correct);
                if (correct) setScore(score + 1);

                setTimeout(() => {
                    if (current + 1 < questions.length) {
                        setCurrent(current + 1);
                        setSelected(null);
                        setIsCorrect(null);
                    } else {
                        setShowResults(true);
                    }
                }, 1200);
            };

            const resetQuiz = () => {
                setCurrent(0);
                setScore(0);
                setShowResults(false);
                setSelected(null);
                setIsCorrect(null);
            };

            if (showResults) {
                return (
                    <div className="animate-fade-in text-center py-10 space-y-8">
                        <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto shadow-2xl ${score >= 9 ? 'bg-emerald-500 shadow-emerald-200' : 'bg-amber-500 shadow-amber-200'}`}>
                            <Icon name={score >= 9 ? "check" : "alert"} size={48} color="white" />
                        </div>
                        <div>
                            <h2 className="text-4xl font-black text-slate-900 italic uppercase text-center">Rezultatul Tău</h2>
                            <p className="text-slate-500 mt-2 text-lg italic text-center">Ai obținut <span className="font-black text-indigo-600">{score} din {questions.length}</span> puncte.</p>
                        </div>
                        <div className="max-w-sm mx-auto p-6 bg-white border border-slate-100 rounded-[2.5rem] shadow-sm">
                            <p className="text-sm text-slate-600 leading-relaxed text-center">
                                {score === questions.length ? "Ești un expert QA! Ai stăpânit toate tehnicile de testare." : 
                                 score >= 9 ? "Foarte bine! Ai înțeles excelent tehnicile Black-Box și tipurile de testare." : 
                                 "Mai ai puțin de învățat. Recitește capitolele despre Tehnicile de Proiectare."}
                            </p>
                        </div>
                        <button 
                            onClick={resetQuiz}
                            className="px-10 py-4 bg-indigo-600 text-white rounded-full font-black uppercase tracking-widest text-xs hover:scale-105 transition-all shadow-xl flex items-center gap-2 mx-auto"
                        >
                            <Icon name="refresh" size={16} /> Reîncepe Quiz-ul
                        </button>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in space-y-12">
                    <div className="flex justify-between items-end px-2">
                        <div>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Progres Evaluare</p>
                            <h3 className="text-2xl font-black text-slate-900 italic tracking-tighter">Întrebarea {current + 1} <span className="text-slate-300">/ {questions.length}</span></h3>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Scor Actual</p>
                            <p className="text-xl font-black text-indigo-600 italic tracking-tighter">{score}</p>
                        </div>
                    </div>

                    <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner">
                        <div 
                            className="h-full bg-indigo-600 transition-all duration-500 ease-out"
                            style={{ width: `${((current + 1) / questions.length) * 100}%` }}
                        ></div>
                    </div>

                    <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-24 h-24 bg-indigo-50 rounded-bl-[4rem]"></div>
                        
                        <p className="font-bold text-xl text-slate-800 mb-10 leading-tight tracking-tight italic relative z-10 text-center sm:text-left">
                            {questions[current].q}
                        </p>

                        <div className="space-y-4">
                            {questions[current].options.map((opt, i) => {
                                let btnClass = "border-slate-100 text-slate-600 hover:border-indigo-300 hover:bg-slate-50";
                                let icon = null;

                                if (selected === i) {
                                    if (isCorrect) {
                                        btnClass = "border-emerald-500 bg-emerald-50 text-emerald-700 font-bold shadow-lg shadow-emerald-100";
                                        icon = <Icon name="check" size={18} />;
                                    } else {
                                        btnClass = "border-red-500 bg-red-50 text-red-700 font-bold shadow-lg shadow-red-100";
                                        icon = <Icon name="alert" size={18} />;
                                    }
                                }

                                return (
                                    <button 
                                        key={i}
                                        onClick={() => handleAnswer(i)}
                                        disabled={selected !== null}
                                        className={`w-full p-6 text-left border rounded-3xl text-sm transition-all duration-300 flex items-center justify-between group ${btnClass}`}
                                    >
                                        <span className="flex items-center gap-4">
                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 text-[10px] font-black ${selected === i ? 'bg-white' : 'bg-slate-100 group-hover:bg-indigo-600 group-hover:text-white transition-colors'}`}>
                                                {String.fromCharCode(65 + i)}
                                            </span>
                                            {opt}
                                        </span>
                                        {icon}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('intro');

            const menuItems = [
                { id: 'intro', label: 'Introducere', icon: 'home' },
                { id: 'scope', label: 'Scopul Testării', icon: 'target' },
                { id: 'blackbox', label: 'Conceptul Black-Box', icon: 'tool' },
                { id: 'bb_techniques', label: 'Tehnici Black-Box', icon: 'zap' },
                { id: 'process', label: 'Procesul de Testare', icon: 'list' },
                { id: 'types_levels', label: 'Tipurile și Nivelurile', icon: 'layers' },
                { id: 'scenarios', label: 'Scenarii Practice', icon: 'bookOpen' },
                { id: 'tools', label: 'Tool-uri Utilizate', icon: 'briefcase' },
                { id: 'quiz', label: 'Evaluare Finală', icon: 'check' }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#F8FAFC]">
                    {/* Sidebar */}
                    <aside className="w-full md:w-80 bg-white border-r border-slate-100 flex flex-col shrink-0 z-20">
                        <div className="p-8">
                            <div className="flex items-center gap-3 text-indigo-600 mb-2">
                                <Icon name="tool" size={28} color="#4f46e5" />
                                <span className="font-black tracking-tighter text-2xl uppercase text-center sm:text-left">QA Pro</span>
                            </div>
                            <h1 className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] text-center sm:text-left">Manual de Testare Funcțională</h1>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-1 overflow-y-auto custom-scrollbar">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all duration-200 group ${
                                        activeTab === item.id 
                                        ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100 font-bold translate-x-1' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-indigo-600'
                                    }`}
                                >
                                    <Icon name={item.icon} color={activeTab === item.id ? "white" : "currentColor"} />
                                    <span className="text-sm tracking-tight">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-8 border-t border-slate-50 mt-auto">
                            <div className="bg-slate-900 rounded-[2rem] p-5 text-white shadow-xl relative overflow-hidden">
                                <div className="relative z-10 text-center sm:text-left">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="text-[10px] uppercase font-black text-slate-400">Mastery Progress</p>
                                        <p className="text-[10px] font-black text-emerald-400 italic">{activeTab === 'quiz' ? '100%' : '85%'}</p>
                                    </div>
                                    <div className="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                                        <div className={`h-full bg-gradient-to-r from-indigo-500 to-emerald-500 transition-all duration-1000 ${activeTab === 'quiz' ? 'w-full' : 'w-[85%]'}`}></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 h-screen overflow-y-auto custom-scrollbar bg-white/50">
                        <div className="max-w-5xl mx-auto p-8 sm:p-16 lg:p-24">
                            
                            {/* SECTION: INTRODUCERE */}
                            {activeTab === 'intro' && (
                                <div className="space-y-16 animate-fade-in">
                                    <header className="max-w-3xl text-center sm:text-left mx-auto sm:mx-0">
                                        <span className="inline-block px-4 py-1.5 bg-indigo-50 text-indigo-700 text-[10px] font-black rounded-full uppercase tracking-widest mb-6">Modulul 01: Fundamente</span>
                                        <h2 className="text-5xl sm:text-6xl font-black text-slate-900 leading-[1.1] tracking-tighter italic">
                                            Testarea <span className="text-indigo-600">Funcțională</span>
                                        </h2>
                                        <p className="text-xl text-slate-500 mt-8 leading-relaxed">

                                                    { name: "Cypress", desc: "Instrument modern bazat pe JavaScript, creat special pentru testare rapidă.", tags: ["Modern UI", "Fast"], color: "indigo" },
                                                    { name: "Playwright", desc: "Framework Microsoft ce oferă suport excelent pentru testare cross-browser.", tags: ["Stability", "Microsoft"], color: "cyan" }
                                                ].map((tool, i) => (
                                                    <div key={i} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-all border-l-4 border-l-blue-500">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <h4 className="font-black text-base text-slate-800 italic uppercase">{tool.name}</h4>
                                                            <div className="flex flex-wrap gap-1 justify-end">
                                                                {tool.tags.map((t, idx) => <span key={idx} className="text-[7px] font-black uppercase tracking-tighter bg-slate-100 px-2 py-0.5 rounded text-slate-500">{t}</span>)}
                                                            </div>
                                                        </div>
                                                        <p className="text-[11px] text-slate-500 leading-relaxed font-medium italic">{tool.desc}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* SECTION: QUIZ FINAL */}
                            {activeTab === 'quiz' && (
                                <div className="animate-fade-in pb-24 text-center">
                                    <header className="text-center mb-16 space-y-4">
                                        <h2 className="text-5xl font-black text-slate-900 italic tracking-tighter uppercase text-center mx-auto">Testul de Evaluare</h2>
                                        <p className="text-slate-500 text-lg italic max-w-xl mx-auto leading-relaxed text-center">
                                            Finalizează acest test pentru a confirma înțelegerea conceptelor fundamentale și a tehnicilor de proiectare.
                                        </p>
                                    </header>
                                    <Quiz />
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
